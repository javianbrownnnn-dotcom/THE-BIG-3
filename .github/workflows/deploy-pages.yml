# Builds the app and publishes it to GitHub Pages so there's always a live
# URL — no manual deploy steps.
#
# Runs in DEMO mode by default (fully functional with seeded data). To go live
# as a shared team workspace, add two repository secrets (Settings → Secrets
# and variables → Actions): VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY. When
# present, the build connects to your Supabase project automatically; when
# absent, it stays in demo mode. The anon key is public-safe by design —
# Row Level Security protects the data.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, "claude/big-3-os-youtube-56g5u6"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /THE-BIG-3/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: SPA fallback
        run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
