# Deploys the Supabase Edge Functions straight from this repo — no local machine
# or `supabase` folder needed. Click "Run workflow" (or push a change under
# supabase/functions/) and every function ships to your project.
#
# One-time setup — add two repository secrets
# (Settings → Secrets and variables → Actions → New repository secret):
#   SUPABASE_ACCESS_TOKEN   Supabase → Account → Access Tokens → Generate new token
#   SUPABASE_PROJECT_REF    the id in your project URL (e.g. abcdwxyz in
#                           https://abcdwxyz.supabase.co)
#
# Your API keys (ANTHROPIC_API_KEY, OPENAI_API_KEY, YOUTUBE_API_KEY, and any
# Google OAuth secrets) are set separately as Edge Function secrets in the
# Supabase dashboard — this workflow only ships the code, never the keys.

name: Deploy Edge Functions

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-functions.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy all edge functions
        run: supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
