<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <title>The Big 3 OS</title>

    <!-- Installable app (Add to Home Screen) -->
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <meta name="theme-color" content="#0d0d0d" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Big 3 OS" />
    <script>
      // Apply theme before first paint to avoid flash. Dark mode first.
      (function () {
        var theme = localStorage.getItem("big3.theme");
        if (theme === "light") document.documentElement.classList.remove("dark");
      })();
      // If the hashed entry bundle 404s (stale cached index.html after a
      // redeploy), recover with one reload instead of a permanent white
      // screen. Lazy-chunk failures after boot are handled in main.tsx via
      // vite:preloadError.
      window.addEventListener(
        "error",
        function (e) {
          var t = e.target;
          if (!t || (t.tagName !== "SCRIPT" && t.tagName !== "LINK")) return;
          var last = Number(sessionStorage.getItem("big3.bootReloadAt") || 0);
          if (Date.now() - last < 30000) return;
          sessionStorage.setItem("big3.bootReloadAt", String(Date.now()));
          location.reload();
        },
        true
      );
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
